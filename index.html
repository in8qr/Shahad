<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>For Shahad ♥</title>
  <link rel="stylesheet" href="fonts.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <canvas id="hearts" aria-hidden="true"></canvas>

  <main class="card">
    <p class="dedication" lang="ar" dir="rtl">الى خريجة قلبي:</p>
    <p class="whisper">just for you</p>
    <h1 class="message">
      <span class="line">I love you</span>
      <span class="name">Shahad</span>
    </h1>
    <p class="subtitle">Every day, a little more.</p>
    <button type="button" class="heart-btn" id="burst" aria-label="Send hearts">
      <span class="heart-icon">♥</span>
    </button>
    <p class="signature">With love,</p>
    <span class="name signature-name">Majed</span>
  </main>

  <script src="script.js"></script>
</body>
</html>
